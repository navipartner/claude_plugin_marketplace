name: Validate Plugins

on: [push, pull_request]

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate AL ID Manager
        run: claude plugin validate ./al-id-manager

      - name: Validate BC Dev CLI
        run: claude plugin validate ./bcdev-cli

      - name: Validate Marketplace
        run: claude plugin validate ./.claude-plugin/marketplace.json

      - name: Validate JSON syntax
        run: |
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            echo "Checking $f..."
            jq . "$f" > /dev/null
          done

  smoke-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test wrapper downloads and runs CLI
        run: |
          chmod +x ./bcdev-cli/bin/bcdev-ensure
          ./bcdev-cli/bin/bcdev-ensure --help

  smoke-test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test wrapper downloads and runs CLI
        run: |
          chmod +x ./bcdev-cli/bin/bcdev-ensure
          ./bcdev-cli/bin/bcdev-ensure --help

  smoke-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test wrapper downloads and runs CLI
        run: .\bcdev-cli\bin\bcdev-ensure.cmd --help
